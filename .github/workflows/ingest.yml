name: Ingest and deploy

on:
  schedule:
    # Daily at 15:10 UTC (~7-8 AM Pacific), after the TCSO ~1 AM Pacific refresh.
    - cron: "10 15 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .[test]

      - name: Run tests
        run: python -m pytest -q

      - name: Ingest sources
        run: python -m ingest.run

      - name: Commit new data
        run: |
          git config user.name "policeblotter-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data
          if git diff --cached --quiet; then
            echo "No new records."
          else
            git commit -m "data: ingest $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp -r site/* _site/
          cp -r data _site/data

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: ingest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
