name: Deploy site

# Deploy the static site to GitHub Pages. This NEVER runs ingestion.
# Triggers:
#   - a push that changes the site or the committed data
#   - manual dispatch
#   - called by the ingest workflow after it commits new data
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}
  workflow_call: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp -r site/* _site/
          cp -r data _site/data

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
